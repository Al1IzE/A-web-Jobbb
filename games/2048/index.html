<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 | A11IzE 的秘密基地</title>
    
    <link rel="stylesheet" type="text/css" href="2048.css"/>
    <script type="text/javascript" src="https://apps.bdimg.com/libs/jquery/2.1.4/jquery.min.js"></script>
    <script type="text/javascript" src="support2048.js"></script>
    <script type="text/javascript" src="showanimation2048.js"></script>
    <script type="text/javascript" src="main2048.js"></script>

    <style>
        /* 全局背景色保持一致 */
        body { background: #faf8ef; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; touch-action: none; }
        
        .back-btn {
            position: fixed; top: 15px; left: 15px; padding: 8px 15px; background: #8f7a66; color: white;
            text-decoration: none; border-radius: 6px; font-size: 14px; font-weight: bold; z-index: 2000;
        }

        /* 核心适配方案：缩放容器 */
        #game-container {
            transform-origin: top center;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 移动端缩放逻辑 */
        @media screen and (max-width: 500px) {
            #game-container {
                /* 如果手机屏幕太窄，自动计算缩放比例（比如 320/500 = 0.64） */
                transform: scale(0.7); /* 你可以根据效果在 0.6 到 0.8 之间调整这个数值 */
                margin-top: 60px; /* 留出返回按钮的位置 */
            }
        }
    </style>
</head>

<body>
    <a href="/games" class="back-btn">← 返回</a>

    <div id="game-container">
        <header>
            <h1>2048</h1>
            <a href="javascript:newgame();" id="newgamebutton">New Game</a>
            <p>Score: <span id="score">0</span></p>
        </header>

        <div id="grid-container">
            <div class="grid-cell" id="grid-cell-0-0"></div>
            <div class="grid-cell" id="grid-cell-0-1"></div>
            <div class="grid-cell" id="grid-cell-0-2"></div>
            <div class="grid-cell" id="grid-cell-0-3"></div>
            <div class="grid-cell" id="grid-cell-1-0"></div>
            <div class="grid-cell" id="grid-cell-1-1"></div>
            <div class="grid-cell" id="grid-cell-1-2"></div>
            <div class="grid-cell" id="grid-cell-1-3"></div>
            <div class="grid-cell" id="grid-cell-2-0"></div>
            <div class="grid-cell" id="grid-cell-2-1"></div>
            <div class="grid-cell" id="grid-cell-2-2"></div>
            <div class="grid-cell" id="grid-cell-2-3"></div>
            <div class="grid-cell" id="grid-cell-3-0"></div>
            <div class="grid-cell" id="grid-cell-3-1"></div>
            <div class="grid-cell" id="grid-cell-3-2"></div>
            <div class="grid-cell" id="grid-cell-3-3"></div>
        </div>
    </div>

    <script>
    // 模拟键盘事件的函数
    function simulateKey(keyCode) {
        var event = $.Event("keydown");
        event.keyCode = keyCode;
        $(document).trigger(event);
    }

    var startx, starty;

    // 监听触摸开始
    document.addEventListener('touchstart', function(e) {
        startx = e.touches[0].pageX;
        starty = e.touches[0].pageY;
    }, {passive: false});

    // 监听触摸结束
    document.addEventListener('touchend', function(e) {
        var endx = e.changedTouches[0].pageX;
        var endy = e.changedTouches[0].pageY;
        var deltax = endx - startx;
        var deltay = endy - starty;

        // 滑动距离太短就不触发（防止误触）
        if (Math.abs(deltax) < 30 && Math.abs(deltay) < 30) return;

        if (Math.abs(deltax) >= Math.abs(deltay)) {
            // 水平滑动
            if (deltax > 0) {
                simulateKey(39); // 右方向键
            } else {
                simulateKey(37); // 左方向键
            }
        } else {
            // 垂直滑动
            if (deltay > 0) {
                simulateKey(40); // 下方向键
            } else {
                simulateKey(38); // 上方向键
            }
        }
    }, {passive: false});

    // 阻止手机浏览器默认的下拉刷新等行为
    document.addEventListener('touchmove', function(e) {
        e.preventDefault();
    }, {passive: false});
</script>
</body>
</html>
